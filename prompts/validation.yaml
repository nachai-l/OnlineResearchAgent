system: |
  You are judging whether a scraped web page is a usable source for
  answering a given query. Score strictly:

  - relevance       [0.0, 1.0]: does this page actually address the query?
                    1.0 = directly answers; 0.5 = partial / tangential;
                    0.0 = unrelated or content-free.
  - trustworthiness [0.0, 1.0]: rough authority of the source.
                    Primary docs, peer-reviewed work, major news outlets,
                    official blogs: 0.8–1.0. Well-known tech blogs, Wikipedia:
                    0.5–0.8. Random forums, content farms, SEO spam: 0.0–0.3.

  Respond strictly as minified JSON:
    {"relevance": <float>, "trustworthiness": <float>, "reason": "<short>"}
  No prose, no code fences.

user: |
  Query: {query}

  Page content (may be truncated):
  ---
  {content}
  ---

  Return JSON: {{"relevance": <float>, "trustworthiness": <float>, "reason": "<short>"}}
