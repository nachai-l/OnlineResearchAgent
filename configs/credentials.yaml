# configs/credentials.yaml
# Intent:
# - Non-secret configuration for API client initialization.
# - This file is COMMITTED to version control.
# - Secrets must come from environment variables (populated via .env or CI).
#
# External consumers:
# - functions.utils.config.load_settings()
# - functions.core.search.WebSearcher
# - functions.llm.client.GeminiClient

serpapi:
  # Name of the ENV VARIABLE that stores the SerpAPI key.
  # Set to null to disable this provider.
  api_key_env: "SERPAPI_API_KEY"

google_cse:
  # Fallback provider used when SerpAPI fails or is disabled.
  api_key_env: "GOOGLE_CSE_API_KEY"
  cx_env: "GOOGLE_CSE_CX"

gemini:
  # Primary auth path: API key from an env var.
  api_key_env: "GEMINI_API_KEY"

  # Optional: useful when running under GCP Application Default Credentials
  # (Workload Identity, service account, etc.) instead of a raw API key.
  # Leave null unless you explicitly need them.
  gcp_project_id: null
  gcp_location: null

litellm:
  # LiteLLM proxy virtual key. Only consulted when parameters.yaml sets
  # `llm.backend: litellm`. The proxy URL itself lives in parameters.yaml
  # (llm.litellm_base_url) since it isn't a secret.
  api_key_env: "LITELLM_API_KEY"
